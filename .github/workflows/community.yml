name: Fetch community benchmarks

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch from mate-bench D1
        env:
          MATE_BENCH_CF_TOKEN: ${{ secrets.MATE_BENCH_CF_TOKEN }}
        run: python3 scripts/fetch_community_benchmarks.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/community_benchmarks.json
          git diff --cached --quiet || git commit -m "Update community benchmarks $(date -u +%Y-%m-%d)"
          git push
