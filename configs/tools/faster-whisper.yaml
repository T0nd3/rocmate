name: faster-whisper
description: Fast Whisper inference using CTranslate2. ROCm support via PyTorch backend.
homepage: https://github.com/SYSTRAN/faster-whisper

chips:
  gfx1100:
    status: tested
    tested_on_rocm: "6.2"
    notes: >
      faster-whisper itself targets CUDA; on AMD use the openai-whisper or whisperX
      route with PyTorch + ROCm, or run faster-whisper on CPU with int8 quantization
      (still fast for short clips). For GPU on AMD, use openai-whisper-rocm fork.
    env_vars:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
    install_hints:
      - "pip install torch torchaudio --index-url https://download.pytorch.org/whl/rocm6.2"
      - "Verify torch.cuda.is_available() returns True (yes, 'cuda' under ROCm)"
      - "For pure faster-whisper: use device='cpu', compute_type='int8' as fallback"

  gfx1101:
    status: partial
    tested_on_rocm: "6.2"
    notes: RX 7800 XT / RX 7700 XT — same PyTorch ROCm approach as gfx1100. Transcription speed similar to gfx1100.
    env_vars:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
    install_hints:
      - "pip install torch torchaudio --index-url https://download.pytorch.org/whl/rocm6.2"

  gfx1151:
    status: tested
    tested_on_rocm: "7.13"
    notes: >
      Strix Halo (Radeon 8060S) — tested successfully with insanely-fast-whisper-rocm
      on ROCm 7.13. Uses native HuggingFace Transformers pipeline + PyTorch SDPA on HIP.
      Model loads to GPU (cuda device = ROCm hip), hip=7.13.26154 detected, SDPA used.
      Supports word timestamps, VAD, and Demucs denoising.
    env_vars: {}
    install_hints:
      - "git clone https://github.com/beecave-homelab/insanely-fast-whisper-rocm && cd insanely-fast-whisper-rocm"
      - "mamba run -n therock pip install fastapi uvicorn python-multipart python-dotenv pyyaml click pydub ffmpeg-python soundfile rich huggingface-hub accelerate optimum gradio typer demucs openai-whisper"
      - "Also run: mamba install -n therock -c conda-forge ffmpeg -y"
      - "Download model: huggingface-cli download openai/whisper-large-v3-turbo"
      - "CLI: mamba run -n therock python -m insanely_fast_whisper_rocm.cli transcribe audio.wav --model openai/whisper-large-v3-turbo --language en --device cuda --timestamp-type word"
      - "Use --timestamp-type word (or chunk/sentence) to avoid post-processing bugs with None chunks"
      - "Tip: processing_time_seconds in output JSON shows actual GPU inference time"
      - "API server: mamba run -n therock python -m insanely_fast_whisper_rocm"

  gfx1030:
    status: partial
    tested_on_rocm: "6.2"
    notes: PyTorch ROCm wheels available, but transcription is slower than gfx1100.
    env_vars: {}
    install_hints:
      - "pip install torch torchaudio --index-url https://download.pytorch.org/whl/rocm6.2"
