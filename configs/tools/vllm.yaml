name: vLLM
description: High-throughput LLM inference server with continuous batching and PagedAttention.
homepage: https://github.com/vllm-project/vllm

chips:
  gfx1100:
    status: tested
    tested_on_rocm: "6.2"
    notes: >
      RX 7900 XTX works well. vLLM pre-allocates GPU memory (90 % by default) so 24 GB lets
      you run 13–34B models. Use --gpu-memory-utilization to tune. Flash-attention is supported
      via ROCm's CK library.
    env_vars:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
    install_hints:
      - "python -m venv venv && source venv/bin/activate"
      - "pip install vllm --extra-index-url https://download.pytorch.org/whl/rocm6.2"
      - "python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3.1-8B-Instruct"
      - "Verify with: curl http://localhost:8000/v1/models"

  gfx1101:
    status: tested
    tested_on_rocm: "6.2"
    notes: RX 7800 XT / RX 7700 XT — works on Linux. 16 GB VRAM limits to ≤13B models.
    env_vars:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
    install_hints:
      - "Same install as gfx1100. Set --gpu-memory-utilization 0.85 to leave headroom."

  gfx1030:
    status: partial
    tested_on_rocm: "6.2"
    notes: >
      RX 6800/6900 — works but slower than RDNA3 cards. PagedAttention works.
      Flash-attention backend may fall back to a slower kernel.
    env_vars: {}
    install_hints:
      - "pip install vllm --extra-index-url https://download.pytorch.org/whl/rocm6.2"

  gfx1102:
    status: partial
    tested_on_rocm: "6.2"
    notes: >
      RX 7600 (8 GB) — vLLM's default memory pre-allocation requires lowering
      --gpu-memory-utilization to 0.80 or less. Stick to 7B Q4/Q8 models.
    env_vars:
      HSA_OVERRIDE_GFX_VERSION: "11.0.0"
    install_hints:
      - "pip install vllm --extra-index-url https://download.pytorch.org/whl/rocm6.2"
      - "python -m vllm.entrypoints.openai.api_server --model <model> --gpu-memory-utilization 0.80"

  gfx1151:
    status: partial
    tested_on_rocm: "7.12"
    notes: >
      Strix Halo (gfx1151) — prefer Lemonade SDK's vllm-rocm portable build via
      Lemonade's vllm:rocm backend. It ships a gfx1151-targeted vLLM, PyTorch,
      and ROCm 7.12 user-space bundle, so no source build or HSA override is
      required. Lemonade documents gfx1151 as validated end-to-end, but ROCm
      vLLM remains experimental; verify with a small model on your kernel/runtime.
      A Linux kernel with the gfx1151 CWSR fix is required (6.18.4+ or a distro
      backport). APU unified memory means --gpu-memory-utilization should leave
      room for the system.
    env_vars: {}
    install_hints:
      - "Lemonade-managed: lemonade backends install vllm:rocm"
      - "Smoke test: lemonade load Qwen3.5-0.8B-vLLM --vllm rocm --ctx-size 512 --vllm-args '--gpu-memory-utilization 0.5'"
      - "Direct bundle/debug: use Lemonade's pinned gfx1151 release (for Lemonade 10.4, vllm0.20.1-rocm7.12.0-gfx1151) rather than a generic upstream source build."
      - "If launching the bundle directly, clear host ROCm/Python overrides such as LD_LIBRARY_PATH, PYTHONPATH, HIP_VISIBLE_DEVICES, and HSA_OVERRIDE_GFX_VERSION."
      - "Verify kernel fix: grep -E 'cwsr_size|ctl_stack_size' /sys/class/kfd/kfd/topology/nodes/*/properties"

  gfx1201:
    status: partial
    tested_on_rocm: "7.x"
    notes: >
      RX 9070 series — requires ROCm 7.x builds of vLLM. Pre-built wheels may not be
      available; expect to build from source. Flash-attention support still maturing.
    env_vars: {}
    install_hints:
      - "Build from source: git clone https://github.com/vllm-project/vllm && pip install -e . --extra-index-url https://download.pytorch.org/whl/rocm7.2"
