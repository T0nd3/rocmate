name: llama.cpp
description: >
  Efficient LLM inference in C++ with HIP (ROCm) or Vulkan backend for AMD GPUs.
  Vulkan works on any RDNA card and is a good alternative where ROCm support is limited.
homepage: https://github.com/ggerganov/llama.cpp

chips:
  gfx1100:
    status: tested
    tested_on_rocm: "7.2.3"
    notes: >
      RX 7900 XTX — 24 GB VRAM. Q4_K_M models up to 70B fit comfortably.
      Tested on ROCm 7.2.3 / Ubuntu 24.04. Benchmark: Gemma 4 26B Q4_K_M ~102 t/s TG, ~3355 t/s PP.
      WARNING: omitting -DGGML_HIP=ON compiles fine but silently falls back to CPU — always verify GPU is used.
      Set HIP_VISIBLE_DEVICES=0 if you have an iGPU to prevent ROCm picking it up as a second device.
      Add -ngl 99 when running — without it layers run on CPU regardless of build flags.
      Vulkan build also works if you prefer to avoid ROCm.
      EXPERIMENTAL: TBQ4 KV cache + MTP on a community fork enables 64k context in ~20 GB VRAM
      (38-54 tok/s on Qwen3-27B Q4_K_M). See github.com/DrBearJew/llama.cpp tree tbq4-rdna3-experiment.
      DUAL GPU: Tensor parallelism requires ROCm — Vulkan TP is a WIP and only works for very small
      contexts. Set HIP_VISIBLE_DEVICES=0,1 and ROCBLAS_USE_HIPBLASLT=1. Use --split-mode tensor
      --tensor-split 1,1 --flash-attn on. Q8_0 fits in 48 GB (2x24 GB) and gives best accuracy.
      MTP (--spec-type draft-mtp --spec-draft-n-max 3) works on dual GPU but limits --parallel to 1
      and disables mmproj. Use --no-mmap if system RAM < total VRAM; --ctx-checkpoints 16 manages
      RAM overhead at 131072 context. See github.com/ggml-org/llama.cpp/pull/22673 for MTP status.
    env_vars: {}
    install_hints:
      - "Linux: git clone https://github.com/ggerganov/llama.cpp && cd llama.cpp"
      - "HIP (ROCm) — full flags: cmake -B build -DGGML_HIP=ON -DAMDGPU_TARGETS=gfx1100 -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=/opt/rocm/bin/hipcc -DCMAKE_CXX_COMPILER=/opt/rocm/bin/hipcc && cmake --build build -j$(nproc)"
      - "Vulkan (no ROCm needed): cmake -B build -DGGML_VULKAN=ON && cmake --build build --config Release -j$(nproc)"
      - "Single GPU run: HIP_VISIBLE_DEVICES=0 ./build/bin/llama-server -m model.gguf -ngl 99 --host 0.0.0.0 --port 8000"
      - "Dual GPU env: export HIP_VISIBLE_DEVICES=0,1 ROCBLAS_USE_HIPBLASLT=1"
      - "Dual GPU run: ./build/bin/llama-server -m model.gguf -ngl 99 --split-mode tensor --tensor-split 1,1 --flash-attn on --ctx-size 131072 --no-mmap --host 0.0.0.0 --port 8000"
      - "Dual GPU + MTP: add --spec-type draft-mtp --spec-draft-n-max 3 --spec-draft-ngl 99 --parallel 1 (MTP: no mmproj, parallel locked to 1)"
      - "Windows: download pre-built HIP binary from GitHub Releases (look for 'hip' in filename)"

  gfx1101:
    status: tested
    tested_on_rocm: "6.2"
    notes: >
      RX 7800 XT / RX 7700 XT — same HIP build as gfx1100. 16 GB VRAM; Q4_K_M models up to 32B.
      Vulkan build is an alternative if ROCm gives trouble.
    env_vars: {}
    install_hints:
      - "Same HIP build as gfx1100."
      - "Vulkan alternative: cmake -B build -DGGML_VULKAN=ON && cmake --build build --config Release -j$(nproc)"

  gfx1102:
    status: tested
    tested_on_rocm: "6.2"
    notes: >
      RX 7600 — 8 GB VRAM; Q4_K_M models up to 8B. Offload remaining layers to CPU with --n-gpu-layers.
      Vulkan build is an alternative if ROCm gives trouble.
    env_vars: {}
    install_hints:
      - "Same HIP build as gfx1100."
      - "Use --n-gpu-layers 30 to partially offload larger models."
      - "Vulkan alternative: cmake -B build -DGGML_VULKAN=ON && cmake --build build --config Release -j$(nproc)"

  gfx1030:
    status: tested
    tested_on_rocm: "6.2"
    notes: >
      RX 6800/6900 — works out of the box with HIP build. Performance slightly below gfx1100.
      Vulkan build is an alternative if ROCm gives trouble.
    env_vars: {}
    install_hints:
      - "Same HIP build as gfx1100."
      - "Vulkan alternative: cmake -B build -DGGML_VULKAN=ON && cmake --build build --config Release -j$(nproc)"

  gfx1151:
    status: tested
    tested_on_rocm: "7.x"
    notes: >
      Strix Halo — compile with GGML_HIP=ON under ROCm 7.x. Also works via Vulkan
      backend as a fallback (GGML_VULKAN=ON). rocWMMA tuning may improve perf.
      APU unified memory; monitor total system RAM usage, not just VRAM.
    env_vars: {}
    install_hints:
      - "git clone https://github.com/ggerganov/llama.cpp && cd llama.cpp"
      - "cmake -B build -DGGML_HIP=ON && cmake --build build --config Release -j$(nproc)"
      - "Vulkan fallback: cmake -B build -DGGML_VULKAN=ON"
      - "Verify GPU: ./build/bin/llama-cli -m model.gguf -p 'hello' --n-gpu-layers 99"

  gfx1201:
    status: partial
    tested_on_rocm: "7.x"
    notes: >
      RX 9070 — ROCm 7.x required for HIP build, not yet widely available.
      Vulkan build is the recommended path until ROCm 7.x is stable:
      cmake -B build -DGGML_VULKAN=ON works on RDNA4 without ROCm.
    env_vars: {}
    install_hints:
      - "Vulkan (recommended): cmake -B build -DGGML_VULKAN=ON && cmake --build build --config Release -j$(nproc)"
      - "HIP: requires ROCm 7.x; may need HSA_OVERRIDE_GFX_VERSION for gfx120x target."
      - "Report your results to the rocmate project!"
